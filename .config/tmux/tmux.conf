# base
unbind -a
set-option -g history-limit 100000
set -sg escape-time 0
set -g status-interval 1
set -g base-index 1
setw -g pane-base-index 1
set-option -g focus-events on
set-option -g renumber-windows on
set -g mode-keys vi
set -g prefix None
set -s set-clipboard external
set -g status off
set -g status-keys emacs # for easy escape

set -s extended-keys on
set -s extended-keys-format xterm
set -g user-keys on

bind -n C-w kill-pane
bind -n M-Escape copy-mode
bind -n M-Enter run "tmux setenv PREVIOUS_DIR '#{pane_current_path}'; [[ $(($(tmux display -p '8*#{pane_width}-20*#{pane_height}'))) -lt 0 ]] \
                     && tmux splitw -v \
                     || tmux splitw -h" 

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe
bind -T copy-mode-vi M-Escape send -X cancel
bind -T copy-mode-vi M-Left select-pane -L 
bind -T copy-mode-vi M-Down select-pane -D 
bind -T copy-mode-vi M-Up select-pane -U   
bind -T copy-mode-vi M-Right select-pane -R

set -g default-terminal "screen-256color"
set-option -sa terminal-features ',xterm-kitty:Tc'
set-option -g status-position top
set-option -g pane-active-border-style "fg=#161b22"
set-option -g pane-border-style "fg=#161b22"
set-option -g popup-border-lines rounded
set -g status-style "bg=default"
set -g status-left-length 150
set -g status-left ""
set -g window-status-current-format ""
set -g window-status-format ""
set -g status-right-length 150
set -g status-right ""
set -g window-status-separator "#[bg=default]"
set -g message-style "fg=default,bg=default,noreverse"
set -g mode-style "fg=default,bg=default,reverse"


# Smart pane switching with awareness of Neovim splits.
# Neovim sets @vim=1 on the pane while running (see lua/config/tmux-nav.lua).
# Use #{@vim} only — #{?#{@vim},true,false} yields the string "false", which if-shell treats as true.
bind-key -n 'M-Left' if-shell -F '#{@vim}' 'send-keys M-Left' 'select-pane -L'
bind-key -n 'M-Down' if-shell -F '#{@vim}' 'send-keys M-Down' 'select-pane -D'
bind-key -n 'M-Up' if-shell -F '#{@vim}' 'send-keys M-Up' 'select-pane -U'
bind-key -n 'M-Right' if-shell -F '#{@vim}' 'send-keys M-Right' 'select-pane -R'

bind -T root "C-Delete" \
  set prefix None \;\
  set key-table off \;\
  set -g status on \;\
  set -g status-right "#[fg=brightred,bold,bg=default]tmux bindings removed: <ctrl-delete> to restore" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S
bind -T off "C-Delete" \
  set -u prefix \;\
  set -u key-table \;\
  set -g status off \;\
  set -g status-right "" \;\
  refresh-client -S

